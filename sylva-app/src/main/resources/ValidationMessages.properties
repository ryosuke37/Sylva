#Package validation
jakarta.validation.constraints.Size.message=\
  ${min == max ? \
        min += '文字で入力してください。' : \
        min == 0 ? \
            max += '文字以内で入力してください。' : \
            min += '文字以上' += max += '文字以内で入力してください。'}
jakarta.validation.constraints.Email.message=不正な{0}です。

#Custom validation
validator.Handle.message={0}は半角英数字と_(アンダースコア)のみで構成されている必要があります。
validator.NotBlankSpace.message={0}を入力してください。
validator.Password.message={0}には、英数字と記号を含めてください。
validator.UnregisteredEmailAddress.message=既に使用されている{0}です。
validator.UnregisteredHandle.message=既に使用されている{0}です。
